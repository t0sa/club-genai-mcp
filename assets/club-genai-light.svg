      <circle cx="540" cy="310" r="4" />
      <circle cx="490" cy="360" r="2" opacity="0.4" />
      <polygon points="530,260 540,265 535,275" opacity="0.9" />
    </g>

    <circle cx="400" cy="240" r="95" stroke="#d97757" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="6 6" />
    <circle cx="400" cy="240" r="115" stroke="#d97757" stroke-width="1.5" fill="none" opacity="0.15" />

    <use href="#network-node" />
