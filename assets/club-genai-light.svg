       <path d="M 400 220 C 350 150, 320 190, 400 240" stroke="#d97757" stroke-width="2.5" fill="none" />
       <circle cx="400" cy="130" r="3.5" fill="#d97757" />
       <line x1="400" y1="210" x2="400" y2="150" stroke="#d97757" stroke-width="1.5" opacity="0.6" />
    </g>
  </defs>

  <g transform="translate(0, -30)">

    <g fill="#b0aea5">
      <circle cx="270" cy="160" r="4" />
      <polygon points="310,110 320,115 315,125" opacity="0.8" />
      <circle cx="240" cy="220" r="2" opacity="0.5" />

      <circle cx="520" cy="140" r="5" opacity="0.6" />
      <polygon points="480,100 488,103 483,112" />
      <circle cx="560" cy="200" r="2.5" />

      <circle cx="250" cy="290" r="3" opacity="0.7" />
